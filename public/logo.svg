<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#F7F0E6"/>
      <stop offset="100%" stop-color="#E8DDD0"/>
    </radialGradient>
    <linearGradient id="darkWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1F1B19"/>
      <stop offset="25%" stop-color="#3A322E"/>
      <stop offset="50%" stop-color="#2B2624"/>
      <stop offset="75%" stop-color="#3A322E"/>
      <stop offset="100%" stop-color="#1F1B19"/>
    </linearGradient>
    <linearGradient id="oakWood" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A574"/>
      <stop offset="40%" stop-color="#B58D63"/>
      <stop offset="100%" stop-color="#8B6B47"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <pattern id="grain" width="6" height="6" patternUnits="userSpaceOnUse">
      <line x1="0" y1="3" x2="6" y2="3" stroke="#000" stroke-opacity="0.06" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Circle badge -->
  <circle cx="200" cy="200" r="188" fill="url(#bg)"/>
  <circle cx="200" cy="200" r="188" fill="url(#grain)"/>
  <circle cx="200" cy="200" r="188" fill="none" stroke="#3D3028" stroke-width="4"/>

  <!-- Wooden Z icon -->
  <g filter="url(#shadow)" transform="translate(200 155)">
    <!-- Top bar -->
    <rect x="-72" y="-42" width="144" height="22" rx="3" fill="url(#darkWood)"/>
    <rect x="-72" y="-42" width="144" height="22" rx="3" fill="url(#grain)" opacity="0.4"/>
    <!-- Diagonal bar -->
    <rect x="-10" y="-28" width="22" height="88" rx="3" fill="url(#oakWood)" transform="rotate(38)"/>
    <rect x="-10" y="-28" width="22" height="88" rx="3" fill="url(#grain)" opacity="0.25" transform="rotate(38)"/>
    <!-- Bottom bar -->
    <rect x="-72" y="20" width="144" height="22" rx="3" fill="url(#darkWood)"/>
    <rect x="-72" y="20" width="144" height="22" rx="3" fill="url(#grain)" opacity="0.4"/>
  </g>

  <!-- ZAFERLİ -->
  <text x="200" y="268" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#2B2624" letter-spacing="2">ZAFERLİ</text>

  <!-- ORMAN ÜRÜNLERİ with lines -->
  <line x1="95" y1="295" x2="145" y2="295" stroke="#5C4033" stroke-width="1.5"/>
  <text x="200" y="302" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5C4033" letter-spacing="3">ORMAN ÜRÜNLERİ</text>
  <line x1="255" y1="295" x2="305" y2="295" stroke="#5C4033" stroke-width="1.5"/>
</svg>
